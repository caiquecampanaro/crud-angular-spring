<mat-card>

  <mat-toolbar color="primary"> Produtos </mat-toolbar>

  <div *ngIf="produtos$ | async as produtos; else loading ">
    <table mat-table [dataSource]="produtos" class="mat-elevation-z8">
      <!-- Nome Column -->
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Produto </th>
        <td mat-cell *matCellDef="let produto"> {{ produto.nome }} </td>
      </ng-container>

      <!-- Categoria Column -->
      <ng-container matColumnDef="categoria">
        <th mat-header-cell *matHeaderCellDef> Categoria </th>
        <td mat-cell *matCellDef="let produto"> {{ produto.categoria }}
          <mat-icon aria-hidden="false" aria-label="Categoaria do curso">{{produto.categoria | categoria}}</mat-icon>
        </td>

      </ng-container>

      <!-- Preço Column -->
      <ng-container matColumnDef="preco">
        <th mat-header-cell *matHeaderCellDef> Preço </th>
        <td mat-cell *matCellDef="let produto"> R$ {{ produto.preco }},00

        </td>

      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colunasProdutos"></tr>
      <tr mat-row *matRowDef="let row; columns: colunasProdutos;"></tr>
    </table>
  </div>
  <ng-template #loading>
    <div class="loading-spinner">
      <mat-spinner></mat-spinner>
    </div>
  </ng-template>
</mat-card>
